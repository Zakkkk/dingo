# Hover test spec for examples/01_error_propagation/http_handler.dingo
#
# IMPORTANT: Use explicit 'character:' positions from VS Code SQLite logs
# to match VS Code behavior exactly. VS Code has a tab expansion offset
# (visual column vs character position) that shifts positions by ~3 chars.
#
# To find exact positions:
#   sqlite3 /tmp/dingo-lsp.db "SELECT msg FROM logs WHERE msg LIKE '%Hover%Request%' ORDER BY ts DESC LIMIT 10;"
#
# Current understanding (2025-12-14):
# - VS Code sends character positions ~3-4 less than visual column when tabs present
# - Our automated test must use same positions to validate VS Code output

file: examples/01_error_propagation/http_handler.dingo

cases:
  # ============================================================
  # Line 55: userID := extractUserID(r)?
  # Pattern 1: Basic error propagation
  # ============================================================

  - id: 1
    line: 55
    token: userID
    description: "LHS variable - returns empty in automated test"
    expect:
      # Automated test returns empty (position not mapped)
      allowAny: true
    vscode_showed: "var tmp string"
    correct:
      contains: "var userID string"

  - id: 2
    line: 55
    token: extractUserID
    description: "Function name - should show signature"
    expect:
      contains: "func extractUserID"

  - id: 3
    line: 55
    token: r
    occurrence: 1
    description: "Function argument r - now works correctly!"
    expect:
      contains: "var r *http.Request"

  - id: 4
    line: 55
    token: "?"
    description: "Error prop operator - returns empty"
    expect:
      allowAny: true

  # ============================================================
  # Line 59: user := loadUserFromDB(userID) ? "database lookup failed"
  # Pattern 2: String context error propagation
  # ============================================================

  - id: 5
    line: 59
    token: user
    occurrence: 1
    description: "LHS variable - returns empty in automated test"
    expect:
      allowAny: true
    vscode_showed: "var tmp1 *User"

  - id: 6
    line: 59
    token: loadUserFromDB
    description: "Function name - should show signature"
    expect:
      contains: "func loadUserFromDB"

  - id: 7
    line: 59
    token: userID
    occurrence: 1
    description: "Function argument - WORKS in automated (shows var), BUG in VS Code (showed func)"
    expect:
      # Automated test correctly shows "var userID string"
      contains: "var userID string"

  # ============================================================
  # Line 63: _ := checkPermissions(r, user) ? |err| NewAppError(...)
  # Pattern 3: Rust-style lambda
  # ============================================================

  - id: 8
    line: 63
    token: checkPermissions
    description: "Function name"
    expect:
      contains: "func checkPermissions"

  - id: 9
    line: 63
    token: r
    occurrence: 1
    description: "First argument r - now works correctly!"
    expect:
      contains: "var r *http.Request"

  - id: 10
    line: 63
    token: user
    occurrence: 1
    description: "Second argument user - works!"
    expect:
      contains: "var user"

  # ============================================================
  # Line 67: response := json.Marshal(user) ? (e) => NewAppError(...)
  # Pattern 4: TypeScript-style lambda
  # ============================================================

  - id: 11
    line: 67
    token: response
    description: "LHS variable - returns empty"
    expect:
      allowAny: true

  - id: 12
    line: 67
    token: json.Marshal
    description: "Qualified function - shows package instead of function"
    expect:
      # Shows package info, not function. Need to hover on 'Marshal' specifically
      containsAny:
        - "package json"
        - "func Marshal"
        - "Marshal("

  - id: 13
    line: 67
    token: user
    occurrence: 1
    description: "Function argument - works!"
    expect:
      contains: "var user"

  # ============================================================
  # Line 77: user := getUser(userID)?
  # AdvancedHandler - Basic pattern
  # ============================================================

  - id: 14
    line: 77
    token: user
    occurrence: 1
    description: "LHS variable - returns empty"
    expect:
      allowAny: true

  - id: 15
    line: 77
    token: getUser
    description: "Function name - works!"
    expect:
      contains: "func getUser"

  - id: 16
    line: 77
    token: userID
    occurrence: 1
    description: "Function argument - works!"
    expect:
      contains: "var userID string"
