# Column precision test - verifies we're hovering on the CORRECT symbol
#
# Line 55 in Dingo: "\tuserID := extractUserID(r)?"
# Line 55 in Go:    "\ttmp, err := extractUserID(r)"
#
# Character offsets (0-indexed, NOT visual columns):
#   0=\t  1=u 2=s 3=e 4=r 5=I 6=D  7=space  8=: 9==  10=space
#   11=e 12=x 13=t 14=r 15=a 16=c 17=t 18=U 19=s 20=e 21=r 22=I 23=D
#   24=(  25=r  26=)  27=?
#
# LSP uses character offsets, NOT visual columns (tab = 1 char, not 4)

file: examples/01_error_propagation/http_handler.dingo

cases:
  # Test 1: userID variable (char 1 = 'u') - should be string
  - name: "userID variable - should be string"
    line: 55
    character: 1
    expect:
      contains: "string"

  # Test 2: := operator (char 8 = ':') - should NOT be string
  - name: ":= operator - should be empty or not string"
    line: 55
    character: 8
    expect:
      notContains: "string"

  # Test 3: extractUserID function (char 11 = 'e') - should be function signature
  - name: "extractUserID function - should show function"
    line: 55
    character: 11
    expect:
      contains: "func"

  # Test 4: r parameter (char 25 = 'r') - should be *http.Request
  - name: "r parameter - should be *http.Request"
    line: 55
    character: 25
    expect:
      contains: "*http.Request"

  # Test 5: ? operator (char 27 = '?') - should NOT be string
  - name: "? operator - should not be string"
    line: 55
    character: 27
    expect:
      notContains: "string"
