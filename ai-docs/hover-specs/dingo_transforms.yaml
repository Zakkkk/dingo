# =============================================================================
# 06_lambdas/data_pipeline.dingo - Lambda transforms
# =============================================================================
file: examples/06_lambdas/data_pipeline.dingo
cases:
  # Lambda parameters should have hover
  - id: 1
    line: 32
    token: u
    occurrence: 1
    description: "Lambda param u in (u) => ..."
    expect:
      containsAny: ["u", "User", "var"]

  - id: 2
    line: 36
    token: u
    occurrence: 1
    description: "Lambda param u in |u| ..."
    expect:
      containsAny: ["u", "User", "var"]

  - id: 3
    line: 40
    token: acc
    description: "Lambda param acc in (acc, u) => ..."
    expect:
      containsAny: ["acc", "string", "var"]

  # Field access inside lambda
  - id: 4
    line: 32
    token: Active
    description: "u.Active field access"
    expect:
      containsAny: ["Active", "bool", "field"]

  - id: 5
    line: 32
    token: Premium
    description: "u.Premium field access"
    expect:
      containsAny: ["Premium", "bool", "field"]

