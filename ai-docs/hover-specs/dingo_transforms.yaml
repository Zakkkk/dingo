# Comprehensive hover tests for Dingo syntax transformations
# These tests specifically target positions that are transformed by the transpiler
# and verify that hover works correctly after transformation
#
# Tests use token-based positioning (occurrence field specifies which match to use)

# =============================================================================
# 02_result/repository.dingo - Result type transformations
# =============================================================================
---
file: examples/02_result/repository.dingo
cases:
  # Line 54: func FindUserByID(db *sql.DB, id int) Result[User, DBError] {
  - id: 1
    line: 54
    token: Result
    description: "Result type keyword in function return"
    expect:
      containsAny: ["Result", "dgo", "type"]

  - id: 2
    line: 54
    token: User
    description: "User type in Result[User, DBError] - first type param"
    expect:
      containsAny: ["User", "struct", "type"]

  - id: 3
    line: 54
    token: DBError
    description: "DBError type in Result[User, DBError] - second type param"
    expect:
      containsAny: ["DBError", "struct", "type"]

  # Line 60: return DBError{Code: "NOT_FOUND", Message: "user not found"}
  - id: 4
    line: 60
    token: DBError
    description: "DBError struct literal (wrapped in dgo.Err)"
    expect:
      containsAny: ["DBError", "struct", "type"]

  - id: 5
    line: 60
    token: Code
    description: "Code field in DBError literal"
    expect:
      containsAny: ["Code", "field", "string"]

  - id: 6
    line: 60
    token: Message
    description: "Message field in DBError literal"
    expect:
      containsAny: ["Message", "field", "string"]

  # Line 70: func TransferFunds(...) Result[bool, DBError] {
  - id: 7
    line: 70
    token: Result
    description: "Result in TransferFunds signature"
    expect:
      containsAny: ["Result", "dgo", "type"]

  - id: 8
    line: 70
    token: bool
    description: "bool type parameter in Result[bool, DBError]"
    expect:
      containsAny: ["bool", "type"]

  - id: 9
    line: 54
    token: FindUserByID
    description: "Function declaration"
    expect:
      containsAny: ["func", "FindUserByID"]

  - id: 10
    line: 70
    token: TransferFunds
    description: "Function declaration"
    expect:
      containsAny: ["func", "TransferFunds"]

---
